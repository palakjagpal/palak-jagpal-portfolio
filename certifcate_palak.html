<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Certificate</title>
    <style>
        /* Remove default spacing */
        * {
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: #000; /* optional: looks good around image */
        }

        /* Certificate Image */
        img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* keeps certificate proportions */
            display: block;
        }
    </style>
</head>
<body>

    <!-- Replace with your certificate image path -->
    <img src="Certificate_Palak_Jagpal.jpg" alt="Certificate">

</body>
</html>
